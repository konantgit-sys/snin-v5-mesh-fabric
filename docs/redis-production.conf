# SNIN V5 Redis Config — Защита от OOM и RDB-ловушек
port 6379
bind 127.0.0.1 ::1
daemonize yes
loglevel notice

# Память — критично!
maxmemory 256mb
maxmemory-policy allkeys-lru

# Без RDB — данные генерируются mesh-сетью заново
save ""

# AOF — минимально для circuit breaker
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
